<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God Sim: Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #001200; margin: 0; overflow: hidden; font-family: sans-serif; color: #fff; }
        canvas { display: block; image-rendering: pixelated; touch-action: none; }
        
        /* Стили UI как в WorldBox */
        .ui-panel { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; border-top: 3px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .tabs { display: flex; background: #222; border-bottom: 1px solid #444; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 10px; font-weight: bold; color: #888; border-right: 1px solid #333; }
        .tab.active { background: #333; color: gold; border-bottom: 2px solid gold; }
        
        .tools { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; height: 120px; overflow-y: auto; }
        .tool { background: #333; border: 1px solid #555; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; position: relative; }
        .tool.active { border-color: gold; background: #444; }
        .tool span { font-size: 8px; margin-top: 4px; text-align: center; line-height: 1; }
        .tool .price { position: absolute; top: -5px; right: -5px; background: gold; color: black; font-size: 8px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }

        #stats { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: space-around; padding: 8px; font-size: 11px; z-index: 10; border-bottom: 1px solid gold; }
        .premium { border-color: gold !important; }
    </style>
</head>
<body>

    <div id="stats">
        <span>👥 <b id="stat-pop">0</b></span>
        <span>🏘️ <b id="stat-houses">0</b></span>
        <span>💰 <b id="stat-mana">100</b></span>
    </div>

    <canvas id="world"></canvas>

    <div class="ui-panel">
        <div class="tabs">
            <div class="tab active" onclick="setTab('nature')">ПРИРОДА</div>
            <div class="tab" onclick="setTab('life')">ЦИВИЛИЗАЦИЯ</div>
            <div class="tab" onclick="setTab('power')">РАЗРУШЕНИЕ</div>
        </div>
                <div class="tools" id="tool-container">
            <!-- Кнопки инструментов -->
        </div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');
    const TILE_SIZE = 10;
    const COLS = Math.floor(window.innerWidth / TILE_SIZE);
    const ROWS = Math.floor((window.innerHeight - 180) / TILE_SIZE);
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 180;

    // Сетка мира
    let grid = Array(COLS).fill().map(() => Array(ROWS).fill(1)); // 1 = Вода
    let units = [];
    let buildings = [];
    let currentTab = 'nature';
    let currentTool = 'grass';

    const ITEMS = {
        nature: [
            { id: 'grass', icon: '🌱', name: 'Трава' },
            { id: 'forest', icon: '🌲', name: 'Лес' },
            { id: 'sand', icon: '🏖️', name: 'Песок' },
            { id: 'mountain', icon: '⛰️', name: 'Горы' }
        ],
        life: [
            { id: 'human', icon: '👨', name: 'Человек' },
            { id: 'king', icon: '👑', name: 'Король', price: '50 ⭐' },
            { id: 'orc', icon: '👹', name: 'Орк', price: '30 ⭐' }
        ],
        power: [
            { id: 'fire', icon: '🔥', name: 'Огонь' },
            { id: 'meteor', icon: '☄️', name: 'Метеор', price: '20 ⭐' },
            { id: 'nuke', icon: '☢️', name: 'Царь-Бомба', price: '100 ⭐' }
        ]
    };

    function setTab(tab) {
        currentTab = tab;
        renderTools();
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
    }

    function renderTools() {
        const container = document.getElementById('tool-container');
        container.innerHTML = '';
        ITEMS[currentTab].forEach(item => {
            const div = document.createElement('div');
            div.className = `tool ${currentTool === item.id ? 'active' : ''}`;
            if(item.price) div.innerHTML += `<div class="price">${item.price}</div>`;
            div.innerHTML += `<div>${item.icon}</div><span>${item.name}</span>`;
            div.onclick = () => selectTool(item);
            container.appendChild(div);
        });
    }
        function selectTool(item) {
        if(item.price) {
            tg.showConfirm(`Разблокировать ${item.name} за ${item.price}?`, (ok) => {
                if(ok) tg.showAlert("Платеж инициирован...");
            });
        } else {
            currentTool = item.id;
            renderTools();
        }
    }

    canvas.addEventListener('pointerdown', (e) => handleInput(e));
    canvas.addEventListener('pointermove', (e) => { if(e.buttons > 0) handleInput(e) });

    function handleInput(e) {
        const x = Math.floor(e.clientX / TILE_SIZE);
        const y = Math.floor(e.clientY / TILE_SIZE);
        if(!grid[x] || grid[x][y] === undefined) return;

        if(currentTool === 'grass') grid[x][y] = 2;
        if(currentTool === 'forest') grid[x][y] = 3;
        if(currentTool === 'sand') grid[x][y] = 4;
        if(currentTool === 'mountain') grid[x][y] = 5;
        if(currentTool === 'fire') grid[x][y] = 6;
        if(currentTool === 'human') units.push({x: e.clientX, y: e.clientY, type: 'h', hp: 100});
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем мир
        for(let x=0; x<COLS; x++) {
            for(let y=0; y<ROWS; y++) {
                if(grid[x][y] === 1) ctx.fillStyle = '#0044aa'; // Вода
                if(grid[x][y] === 2) ctx.fillStyle = '#44aa44'; // Трава
                if(grid[x][y] === 3)
                    ctx.fillStyle = '#005500'; // Лес
                if(grid[x][y] === 4) ctx.fillStyle = '#ddccaa'; // Песок
                if(grid[x][y] === 5) ctx.fillStyle = '#666666'; // Горы
                if(grid[x][y] === 6) { 
                    ctx.fillStyle = '#ff4400'; // Огонь
                    if(Math.random() < 0.02) grid[x][y] = 4; // Сгорает в песок
                }
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE-1, TILE_SIZE-1);
            }
        }

        // Логика юнитов
        units.forEach((u, i) => {
            u.x += (Math.random()-0.5)*2;
            u.y += (Math.random()-0.5)*2;
            
            // Проверка на дома
            let nearby = units.filter(other => Math.hypot(u.x-other.x, u.y-other.y) < 20);
            if(nearby.length >= 3 && Math.random() < 0.01) {
                buildings.push({x: u.x, y: u.y});
                units = units.filter(unit => !nearby.includes(unit)); // "Уходят" в дом
            }

            ctx.fillStyle = 'white';
            ctx.fillRect(u.x, u.y, 4, 4);
        });

        // Рисуем дома
        ctx.fillStyle = '#8b4513';
        buildings.forEach(b => ctx.fillRect(b.x, b.y, 12, 10));

        document.getElementById('stat-pop').innerText = units.length;
        document.getElementById('stat-houses').innerText = buildings.length;
        requestAnimationFrame(update);
    }

    renderTools();
    update();
</script>
</body>
</html>
