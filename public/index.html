<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruins WorldBox AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; margin: 0; overflow: hidden; user-select: none; }
        canvas { display: block; background: #223e15; touch-action: none; }
        .ui-top { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: space-around; padding: 5px; font-size: 12px; border-bottom: 1px solid #444; }
        .ui-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; box-sizing: border-box; }
        button { background: #333; border: 1px solid #555; color: white; padding: 10px 2px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        button.active { border-color: gold; background: #444; color: gold; }
        .btn-red { color: #ff4444; }
        .btn-green { color: #44ff44; }
    </style>
</head>
<body>

    <div class="ui-top">
        <span>👥 Люди: <b id="p-h">0</b></span>
        <span>👹 Орки: <b id="p-o">0</b></span>
        <span>🌳 Лес: <b id="p-t">0</b></span>
    </div>

    <canvas id="world"></canvas>

    <div class="ui-bottom">
        <button id="btn-human" class="active" onclick="setTool('human')">👨 ЧЕЛОВЕК</button>
        <button id="btn-orc" onclick="setTool('orc')">👹 ОРК</button>
        <button id="btn-tree" onclick="setTool('tree')" class="btn-green">🌳 ДЕРЕВО</button>
        <button id="btn-fire" onclick="setTool('fire')" class="btn-red">🔥 ОГОНЬ</button>
        
        <button onclick="setTool('meteor')" style="background: #400; border-color: red;">☄️ МЕТЕОР</button>
        <button onclick="setTool('rain')" class="btn-green">🌧️ ДОЖДЬ</button>
        <button onclick="clearWorld()">🧹 СТЕРЕТЬ</button>
        <button onclick="raidBot()">⚔️ РЕЙД БОТА</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 120;

        let entities = [];
        let currentTool = 'human';

        class Unit {
                        constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.hp = 100;
                this.color = type === 'human' ? '#44f' : '#f44';
                this.target = null;
                this.speed = type === 'human' ? 1 : 1.2;
            }
            update() {
                // Ищем врага
                let enemyType = this.type === 'human' ? 'orc' : 'human';
                let enemy = entities.find(e => e.type === enemyType && Math.hypot(e.x - this.x, e.y - this.y) < 150);
                
                if (enemy) {
                    let dx = enemy.x - this.x;
                    let dy = enemy.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist > 5) {
                        this.x += (dx/dist) * this.speed;
                        this.y += (dy/dist) * this.speed;
                    } else {
                        enemy.hp -= 1; // Атака
                    }
                } else {
                    // Просто бродим
                    this.x += (Math.random() - 0.5) * 2;
                    this.y += (Math.random() - 0.5) * 2;
                }
                
                // Размножение (если сыты)
                if (Math.random() < 0.002) entities.push(new Unit(this.x, this.y, this.type));
                
                // Границы
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class Tree {
            constructor(x, y) { this.x = x; this.y = y; this.type = 'tree'; this.hp = 100; }
            update() { if(Math.random() < 0.001) entities.push(new Tree(this.x + (Math.random()-0.5)*40, this.y + (Math.random()-0.5)*40)); }
            draw() {
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(this.x - 5, this.y - 10, 10, 15);
            }
        }

        function setTool(t) {
            currentTool = t;
                        document.querySelectorAll('.ui-bottom button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t)?.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        canvas.addEventListener('pointerdown', (e) => {
            const x = e.clientX; const y = e.clientY - 40;
            if (currentTool === 'human') entities.push(new Unit(x, y, 'human'));
            if (currentTool === 'orc') entities.push(new Unit(x, y, 'orc'));
            if (currentTool === 'tree') entities.push(new Tree(x, y));
            if (currentTool === 'fire') explode(x, y, 30, 'orange');
            if (currentTool === 'meteor') { explode(x, y, 80, 'red'); tg.HapticFeedback.notificationOccurred('error'); }
            if (currentTool === 'rain') { /* Позже добавим рост леса от дождя */ }
        });

        function explode(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
            entities = entities.filter(e => Math.hypot(e.x - x, e.y - y) > radius);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function clearWorld() { entities = []; }
        
        function raidBot() {
            // Спавним армию ботов сверху экрана
            for(let i=0; i<10; i++) entities.push(new Unit(Math.random()*canvas.width, 0, 'orc'));
            tg.showAlert("ОРКИ НАПАЛИ С СЕВЕРА!");
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            entities = entities.filter(e => e.hp > 0);
            
            let h = 0, o = 0, t = 0;
            entities.forEach(e => {
                e.update(); e.draw();
                if(e.type === 'human') h++;
                if(e.type === 'orc') o++;
                if(e.type === 'tree') t++;
            });
            
            document.getElementById('p-h').innerText = h;
            document.getElementById('p-o').innerText = o;
            document.getElementById('p-t').innerText = t;
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
